<!DOCTYPE html>
<html>

<head>
    <style>
        /* 배경색을 Orbit 느낌의 연한 파란색으로 변경 */
        body {
            background-color: #f0f2f5;
            font-family: 'Arial', sans-serif;
        }

        /* 가입창을 하얗고 둥글게 디자인 */
        #signupForm {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
            margin: 50px auto;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>Orbit SNS 회원가입</h2>
    <form id="signupForm">
        <input type="text" id="name" placeholder="이름" required><br>
        <input type="email" id="email" placeholder="이메일" required><br>
        <input type="password" id="password" placeholder="비밀번호" required><br>
        <button type="submit">가입하기</button>
    </form>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/signup/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const result = await response.json();
            alert(result.message || "ㅅㅂ에러");
        };
    </script>
</body>

</html>
