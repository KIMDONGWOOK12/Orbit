<!DOCTYPE html>
<html>

<head>
    <title>Orbit SNS - 회원가입</title>
    <style>
        /*크기를 키우고 가운데 정렬하는 CSS */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            /* Orbit 배경 */
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #signupForm {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 400px;
            /* 가로 크기 확대 */
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* 칸 사이 간격 */
        }

        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 30px;
        }

        /*입력칸 크기 확대 */
        input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1.1rem;
            /*  글자 크기 확대 */
        }

        /* 버튼 크기 및 색상 변경 (Maroon 포인트) */
        button {
            padding: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            background-color: #88282d;
            /* 마룬 색상 */
            color: white;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(136, 40, 45, 0.4);
        }
    </style>
</head>

<body>
    <form id="signupForm">
        <h2>박민혁인가? 회원가입</h2>
        <input type="text" id="name" placeholder="이름" required>
        <input type="email" id="email" placeholder="이메일" required>
        <input type="password" id="password" placeholder="비밀번호" required>
        <button type="submit">가입 완료</button>
    </form>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();

            // 데이터 준비
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                // Swagger에 나온 대로 '/signup/'으로 요청을 보냅니다.
                const response = await fetch('/signup/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("축하합니다! 회원가입이 완료되었습니다.");
                    // 성공 시 대문('/')으로 자동 이동합니다.
                    window.location.href = "/";
                } else {
                    // 실패 시 원인을 알려줍니다 (예: 이미 가입된 이메일 등)
                    alert("가입 실패: " + (result.detail || "ㅅㅂ에러"));
                }
            } catch (err) {
                console.error(err);
                alert("서버와 통신 오류. 터미널을 확인 ㄱㄱ");
            }
        };
    </script>
</body>

</html>
